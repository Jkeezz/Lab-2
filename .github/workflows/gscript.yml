name: Automated closed Issues commenter and First PR Congratulator
permissions:
  issues: write
  pull-requests: write
  contents: read
on:
  issues:
    types: [closed]
  pull_request:
    types: [opened]

jobs:
  issue_closed_comment:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Comment when issue is closed
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "The issue is now resolved."
            });

  first_pr_congrats:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Congratulate for first PR
        uses: actions/github-script@v9
        with:
          script: |
            const username = context.payload.pull_request.user.login;

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all"
            });

            const userPRs = prs.data.filter(pr => pr.user.login === username);

            if (true) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `Congratulations @${username} for opening your first pull request!`
              });
            }
